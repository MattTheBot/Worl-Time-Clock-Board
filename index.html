<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>World Time Board</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
    }
    input, select, button {
      margin: 5px;
      padding: 8px;
      font-size: 14px;
    }
    .user {
      margin: 10px;
      padding: 10px;
      border: 1px solid #444;
      border-radius: 8px;
      display: inline-block;
      min-width: 150px;
    }
    .time {
      font-size: 20px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<h2>World Time Board</h2>

<input id="name" placeholder="Your name">
<select id="timezone"></select>
<button onclick="addUser()">Join</button>

<div id="users"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, collection, addDoc,
  onSnapshot, updateDoc, doc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* === PASTE YOUR FIREBASE CONFIG HERE === */
  const firebaseConfig = {
    apiKey: "AIzaSyDEh9LfFywf67k3rMUjFZnsslOme6T5m_4",
    authDomain: "web-app-clock-fidget.firebaseapp.com",
    projectId: "web-app-clock-fidget",
    storageBucket: "web-app-clock-fidget.firebasestorage.app",
    messagingSenderId: "468848014550",
    appId: "1:468848014550:web:b2be733bd517f3a5c8c577",
    measurementId: "G-2FDSHWH73F"
  };

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* === TIMEZONE LIST === */
const tzSelect = document.getElementById("timezone");
Intl.supportedValuesOf('timeZone').forEach(tz => {
  let opt = document.createElement("option");
  opt.value = tz;
  opt.textContent = tz;
  tzSelect.appendChild(opt);
});

/* === ADD USER === */
async function addUser() {
  const name = document.getElementById("name").value;
  const timezone = tzSelect.value;

  if (!name) return alert("Enter name");

  await addDoc(collection(db, "users"), {
    name,
    timezone,
    active: true
  });

  document.getElementById("name").value = "";
}

window.addUser = addUser;

/* === LIVE RENDER === */
const container = document.getElementById("users");

onSnapshot(collection(db, "users"), snapshot => {
  container.innerHTML = "";

  snapshot.forEach(docSnap => {
    const data = docSnap.data();
    if (!data.active) return;

    const div = document.createElement("div");
    div.className = "user";

    const timeEl = document.createElement("div");
    timeEl.className = "time";

    const nameEl = document.createElement("div");
    nameEl.textContent = data.name;

    const toggle = document.createElement("button");
    toggle.textContent = "Leave";
    toggle.onclick = async () => {
      await updateDoc(doc(db, "users", docSnap.id), {
        active: false
      });
    };

    div.appendChild(nameEl);
    div.appendChild(timeEl);
    div.appendChild(toggle);
    container.appendChild(div);

    /* LIVE CLOCK */
    function updateTime() {
      const now = new Date();
      timeEl.textContent = now.toLocaleTimeString("en-GB", {
        timeZone: data.timezone,
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
      });
    }

    updateTime();
    setInterval(updateTime, 1000);
  });
});
</script>

</body>
</html>
