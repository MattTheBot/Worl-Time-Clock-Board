<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>World Time Board</title>

  <!-- OPTIONAL: external CSS (recommended for GitHub) -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h2>World Time Board</h2>

<input id="name" placeholder="Your name">
<select id="timezone"></select>
<button id="joinBtn">Join</button>

<div id="error"></div>
<div id="users"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  doc,
  deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyDeh9LfFywf67k3rMUjFZnsslOme6T5m_4",
  authDomain: "web-app-clock-fidget.firebaseapp.com",
  projectId: "web-app-clock-fidget",
  storageBucket: "web-app-clock-fidget.firebasestorage.app",
  messagingSenderId: "468848014550",
  appId: "1:468848014550:web:b2be733bd517f3a5c8c577"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ERROR DISPLAY */
const errorBox = document.getElementById("error");
function error(msg) {
  errorBox.textContent = msg;
}

/* TIMEZONES */
const tzSelect = document.getElementById("timezone");
Intl.supportedValuesOf("timeZone").forEach(tz => {
  const opt = document.createElement("option");
  opt.value = tz;
  opt.textContent = tz;
  tzSelect.appendChild(opt);
});

/* JOIN */
document.getElementById("joinBtn").onclick = async () => {
  const name = document.getElementById("name").value;

  if (!name) return error("Enter a name");

  try {
    await addDoc(collection(db, "users"), {
      name,
      timezone: tzSelect.value,
      createdAt: Date.now()
    });

    error("");
    document.getElementById("name").value = "";
  } catch (e) {
    error("Write failed: " + e.message);
  }
};

/* LIVE USERS */
const container = document.getElementById("users");

onSnapshot(collection(db, "users"), snapshot => {
  container.innerHTML = "";

  snapshot.forEach(docSnap => {
    const data = docSnap.data();

    const div = document.createElement("div");
    div.className = "user";

    const nameEl = document.createElement("div");
    nameEl.textContent = data.name;

    const timeEl = document.createElement("div");
    timeEl.className = "time";

    const btn = document.createElement("button");
    btn.textContent = "Leave";

    btn.onclick = async () => {
      try {
        await deleteDoc(doc(db, "users", docSnap.id));
      } catch (e) {
        error("Delete failed: " + e.message);
      }
    };

    div.appendChild(nameEl);
    div.appendChild(timeEl);
    div.appendChild(btn);
    container.appendChild(div);

    function updateTime() {
      try {
        timeEl.textContent = new Date().toLocaleTimeString("en-GB", {
          timeZone: data.timezone,
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit"
        });
      } catch {
        timeEl.textContent = "Time error";
      }
    }

    updateTime();
    setInterval(updateTime, 1000);
  });
});
</script>

</body>
</html>
