<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>World Time Board</title>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
      padding: 20px;
    }

    input, select, button {
      margin: 5px;
      padding: 8px;
      font-size: 14px;
      border-radius: 6px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: white;
    }

    button {
      cursor: pointer;
    }

    .user {
      margin: 10px;
      padding: 12px;
      border: 1px solid #444;
      border-radius: 10px;
      display: inline-block;
      min-width: 180px;
      background: #1a1a1a;
    }

    .time {
      font-size: 20px;
      font-weight: bold;
      margin-top: 5px;
    }

    #error {
      color: #ff4d4d;
      margin-top: 10px;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>

<h2>World Time Board</h2>

<input id="name" placeholder="Your name">
<select id="timezone"></select>
<button id="joinBtn">Join</button>

<div id="error"></div>
<div id="users"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  updateDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const errorBox = document.getElementById("error");

function showError(msg) {
  errorBox.textContent = msg;
  console.error(msg);
}

/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyDeh9LfFywf67k3rMUjFZnsslOme6T5m_4",
  authDomain: "web-app-clock-fidget.firebaseapp.com",
  projectId: "web-app-clock-fidget",
  storageBucket: "web-app-clock-fidget.firebasestorage.app",
  messagingSenderId: "468848014550",
  appId: "1:468848014550:web:b2be733bd517f3a5c8c577"
};

let app, db;

try {
  app = initializeApp(firebaseConfig);
  db = getFirestore(app);
} catch (e) {
  showError("Firebase init failed:\n" + e.message);
}

/* TIMEZONES */
const tzSelect = document.getElementById("timezone");
try {
  Intl.supportedValuesOf('timeZone').forEach(tz => {
    const opt = document.createElement("option");
    opt.value = tz;
    opt.textContent = tz;
    tzSelect.appendChild(opt);
  });
} catch (e) {
  showError("Timezone load failed");
}

/* JOIN BUTTON */
document.getElementById("joinBtn").onclick = async () => {
  const name = document.getElementById("name").value;
  const timezone = tzSelect.value;

  if (!name) {
    showError("Enter a name first");
    return;
  }

  if (!db) {
    showError("Database not initialized");
    return;
  }

  try {
    await addDoc(collection(db, "users"), {
      name,
      timezone,
      active: true,
      createdAt: Date.now()
    });

    document.getElementById("name").value = "";
    errorBox.textContent = "";
  } catch (e) {
    showError("Write failed:\n" + e.message);
  }
};

/* LIVE DATA */
const container = document.getElementById("users");

try {
  onSnapshot(collection(db, "users"), snapshot => {
    container.innerHTML = "";

    snapshot.forEach(docSnap => {
      const data = docSnap.data();

      const div = document.createElement("div");
      div.className = "user";

      const nameEl = document.createElement("div");
      nameEl.textContent = data.name || "No name";

      const timeEl = document.createElement("div");
      timeEl.className = "time";

      const btn = document.createElement("button");
      btn.textContent = "Leave";

      btn.onclick = async () => {
        try {
          await updateDoc(doc(db, "users", docSnap.id), {
            active: false
          });
        } catch (e) {
          showError("Update failed:\n" + e.message);
        }
      };

      div.appendChild(nameEl);
      div.appendChild(timeEl);
      div.appendChild(btn);
      container.appendChild(div);

      function updateTime() {
        try {
          const now = new Date();
          timeEl.textContent = now.toLocaleTimeString("en-GB", {
            timeZone: data.timezone,
            hour: "2-digit",
            minute: "2-digit",
            second: "2-digit"
          });
        } catch {
          timeEl.textContent = "Time error";
        }
      }

      updateTime();
      setInterval(updateTime, 1000);
    });
  });
} catch (e) {
  showError("Snapshot failed:\n" + e.message);
}

</script>

</body>
</html>
