<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Live Time Presence Board</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1 class="title">Live Presence Time Board</h1>
<p class="subtitle">Join your timezone and see everyone in real time</p>

<div class="join-box">
  <input id="name" placeholder="Your name">
  <select id="timezone"></select>
  <button id="joinBtn">Join</button>
</div>

<div id="error"></div>
<div id="users"></div>

<div class="watermark">@Matthew Thonhauser</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyDeh9LfFywf67k3rMUjFZnsslOme6T5m_4",
  authDomain: "web-app-clock-fidget.firebaseapp.com",
  projectId: "web-app-clock-fidget",
  storageBucket: "web-app-clock-fidget.firebasestorage.app",
  messagingSenderId: "468848014550",
  appId: "1:468848014550:web:b2be733bd517f3a5c8c577"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const errorBox = document.getElementById("error");
function error(msg) {
  errorBox.textContent = msg;
}

/* TIMEZONES */
const tzSelect = document.getElementById("timezone");
Intl.supportedValuesOf("timeZone").forEach(tz => {
  const opt = document.createElement("option");
  opt.value = tz;
  opt.textContent = tz;
  tzSelect.appendChild(opt);
});

/* STORE FOR DUPLICATE CHECK */
let existingNames = new Set();

/* LIVE SNAPSHOT (also tracks names) */
const container = document.getElementById("users");

onSnapshot(collection(db, "users"), snapshot => {
  container.innerHTML = "";
  existingNames.clear();

  snapshot.forEach(docSnap => {
    const data = docSnap.data();

    existingNames.add(data.name?.toLowerCase());

    const div = document.createElement("div");
    div.className = "user";

    const nameEl = document.createElement("div");
    nameEl.textContent = data.name;

    const timeEl = document.createElement("div");
    timeEl.className = "time";

    const btn = document.createElement("button");
    btn.textContent = "Leave";

    btn.onclick = async () => {
      await deleteDoc(doc(db, "users", docSnap.id));
    };

    div.appendChild(nameEl);
    div.appendChild(timeEl);
    div.appendChild(btn);
    container.appendChild(div);

    function tick() {
      timeEl.textContent = new Date().toLocaleTimeString("en-GB", {
        timeZone: data.timezone,
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
      });
    }

    tick();
    setInterval(tick, 1000);
  });
});

/* JOIN WITH DUPLICATE PREVENTION */
document.getElementById("joinBtn").onclick = async () => {
  const name = document.getElementById("name").value.trim();
  const timezone = tzSelect.value;

  if (!name) return error("Enter a name");

  if (existingNames.has(name.toLowerCase())) {
    return error("Name already exists. Choose another.");
  }

  try {
    await addDoc(collection(db, "users"), {
      name,
      timezone,
      createdAt: Date.now()
    });

    error("");
    document.getElementById("name").value = "";
  } catch (e) {
    error("Write failed: " + e.message);
  }
};
</script>

</body>
</html>
